openapi: 3.1.0
info:
  title: API Fédération Agricole
  description: Spécification OpenAPI pour la gestion de la fédération de collectivités agricoles
  version: 1.0.0

servers:
  - url: 'http://localhost:8080'
  tags:
  - name: Collectivités
    description: Gestion des collectivités (création, modification, suppression, autorisation)
  - name: Mandats
    description: Gestion des mandats des dirigeants d'une collectivité
  - name: Membres
    description: Gestion des membres (admission, modification, transfert, démission)
  - name: Cotisations
    description: Enregistrement et suivi des cotisations des membres
  - name: Comptes
    description: Gestion des comptes financiers (caisse, bancaire, mobile money)
  - name: Activités
    description: Gestion des activités d'une collectivité
  - name: Présences
    description: Enregistrement et suivi des présences aux activités
  - name: Statistiques Collectivité
    description: Statistiques et indicateurs d'une collectivité
  - name: Fédération - Activités
    description: Activités planifiées et gérées au niveau fédéral
  - name: Fédération - Statistiques
    description: Rapports et statistiques globales de la fédération

paths:

  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister toutes les collectivités
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectiviteResponse"
    post:
      tags: [Collectivités]
      summary: Créer une collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectiviteRequest"
      responses:
        "201":
          description: Créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /collectivites/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Collectivités]
      summary: Obtenir une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Collectivités]
      summary: Modifier une collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectiviteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Collectivités]
      summary: Supprimer une collectivité
      responses:
        "204":
          description: Supprimée
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/autorisation:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      tags: [Collectivités]
      summary: Accorder l'autorisation d'ouverture
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectivites/{id}/mandats:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Mandats]
      summary: Lister les mandats d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MandatResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Mandats]
      summary: Créer un mandat
      description: Mandat d'un an. Max 2 mandats par membre par poste.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MandatRequest"
      responses:
        "201":
          description: Mandat créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandatResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /collectivites/{id}/mandats/{mandat_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/mandat_id"
    get:
      tags: [Mandats]
      summary: Obtenir un mandat
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandatResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/membres:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Membres]
      summary: Lister les membres d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Membres]
      summary: Admettre un nouveau membre
      description: Parrain confirmé requis (ancienneté > 90 jours). Membres fondateurs avec 6 mois d'ancienneté minimum.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembreRequest"
      responses:
        "201":
          description: Admis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /collectivites/{id}/membres/{membre_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/membre_id"
    get:
      tags: [Membres]
      summary: Obtenir un membre
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Membres]
      summary: Modifier un membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembreUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/membres/{membre_id}/transfert:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/membre_id"
    post:
      tags: [Membres]
      summary: Transférer un membre vers une autre collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nouvelle_collectivite_id]
              properties:
                nouvelle_collectivite_id:
                  type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/membres/{membre_id}/demission:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/membre_id"
    post:
      tags: [Membres]
      summary: Enregistrer la démission d'un membre
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectivites/{id}/cotisations:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Cotisations]
      summary: Lister les cotisations d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CotisationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Cotisations]
      summary: Enregistrer une cotisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CotisationRequest"
      responses:
        "201":
          description: Cotisation enregistrée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CotisationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/cotisations/{cotisation_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/cotisation_id"
    get:
      tags: [Cotisations]
      summary: Obtenir une cotisation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CotisationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Cotisations]
      summary: Supprimer une cotisation
      responses:
        "204":
          description: Supprimée
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/comptes:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Comptes]
      summary: Lister les comptes d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Comptes]
      summary: Ajouter un compte
      description: Une seule caisse autorisée. Plusieurs comptes bancaires et mobile money possibles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompteRequest"
      responses:
        "201":
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectivites/{id}/comptes/{compte_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/compte_id"
    get:
      tags: [Comptes]
      summary: Obtenir un compte
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Comptes]
      summary: Modifier un compte
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Comptes]
      summary: Supprimer un compte
      responses:
        "204":
          description: Supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/comptes/{compte_id}/solde:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/compte_id"
    get:
      tags: [Comptes]
      summary: Obtenir le solde d'un compte
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoldeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/activites:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Activités]
      summary: Lister les activités d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Activités]
      summary: Créer une activité
      description: Types obligatoires (ASSEMBLEE_GENERALE, FORMATION_JUNIOR) ou exceptionnelle avec présence optionnelle ou ciblée.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActiviteRequest"
      responses:
        "201":
          description: Activité créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/activites/{activite_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/activite_id"
    get:
      tags: [Activités]
      summary: Obtenir une activité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Activités]
      summary: Modifier une activité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActiviteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Activités]
      summary: Supprimer une activité
      responses:
        "204":
          description: Supprimée
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/activites/{activite_id}/presences:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/activite_id"
    get:
      tags: [Présences]
      summary: Lister les présences d'une activité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Présences]
      summary: Enregistrer la présence d'un membre
      description: Un membre d'une autre collectivité peut être inscrit mais sa présence ne compte pas dans son taux d'assiduité.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceRequest"
      responses:
        "201":
          description: Présence enregistrée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectivites/{id}/activites/{activite_id}/presences/{membre_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/activite_id"
      - $ref: "#/components/parameters/membre_id"
    put:
      tags: [Présences]
      summary: Modifier la présence d'un membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresenceResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/statistiques:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Statistiques Collectivité]
      summary: Statistiques globales de la collectivité
      parameters:
        - name: mois
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatCollectiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/statistiques/membres:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      tags: [Statistiques Collectivité]
      summary: Statistiques détaillées par membre actif
      parameters:
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatMembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /federation/statistiques:
    get:
      tags: [Fédération - Statistiques]
      summary: Rapport global des statistiques de toutes les collectivités
      parameters:
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatFederationResponse"

  /federation/statistiques/mensuel:
    get:
      tags: [Fédération - Statistiques]
      summary: Rapport mensuel agrégé de toutes les collectivités
      parameters:
        - name: mois
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatFederationResponse"

  /federation/activites:
    get:
      tags: [Fédération - Activités]
      summary: Lister les activités de la fédération
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiviteResponse"
    post:
      tags: [Fédération - Activités]
      summary: Créer une activité fédérale
      description: Activité planifiée par la fédération, obligatoire ou non pour les collectivités.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActiviteRequest"
      responses:
        "201":
          description: Activité créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /federation/activites/{activite_id}:
    parameters:
      - $ref: "#/components/parameters/activite_id"
    get:
      tags: [Fédération - Activités]
      summary: Obtenir une activité fédérale
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Fédération - Activités]
      summary: Modifier une activité fédérale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActiviteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Fédération - Activités]
      summary: Supprimer une activité fédérale
      responses:
        "204":
          description: Supprimée
        "404":
          $ref: "#/components/responses/NotFound"

components:

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    membre_id:
      name: membre_id
      in: path
      required: true
      schema:
        type: integer
    mandat_id:
      name: mandat_id
      in: path
      required: true
      schema:
        type: integer
    cotisation_id:
      name: cotisation_id
      in: path
      required: true
      schema:
        type: integer
    compte_id:
      name: compte_id
      in: path
      required: true
      schema:
        type: integer
    activite_id:
      name: activite_id
      in: path
      required: true
      schema:
        type: integer

  responses:
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Données invalides
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Conditions métier non remplies
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflit avec l'état actuel
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:

    CollectiviteRequest:
      type: object
      required: [nom, ville, specialite, membres_fondateurs]
      properties:
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        membres_fondateurs:
          type: array
          minItems: 10
          description: IDs des membres avec au moins 6 mois d'ancienneté dans la fédération
          items:
            type: integer
        postes_initiaux:
          type: array
          items:
            $ref: "#/components/schemas/PosteAttribution"

    CollectiviteResponse:
      type: object
      properties:
        id:
          type: integer
        numero:
          type: string
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        date_creation:
          type: string
          format: date
        autorisation_federation:
          type: boolean

    PosteAttribution:
      type: object
      required: [membre_id, poste]
      properties:
        membre_id:
          type: integer
        poste:
          $ref: "#/components/schemas/Poste"

    MandatRequest:
      type: object
      required: [annee, postes]
      properties:
        annee:
          type: integer
        postes:
          type: array
          items:
            $ref: "#/components/schemas/PosteAttribution"

    MandatResponse:
      type: object
      properties:
        id:
          type: integer
        annee:
          type: integer
        collectivite_id:
          type: integer
        postes:
          type: array
          items:
            $ref: "#/components/schemas/PosteAttribution"

    MembreRequest:
      type: object
      required: [nom, prenoms, date_naissance, genre, adresse, metier, telephone, email, parrains, paiement]
      properties:
        nom:
          type: string
        prenoms:
          type: string
        date_naissance:
          type: string
          format: date
        genre:
          $ref: "#/components/schemas/Genre"
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        parrains:
          type: array
          minItems: 2
          description: >-
            Au moins 2 membres confirmés. Le nombre de parrains de la collectivité
            cible doit être >= au nombre de parrains extérieurs.
