openapi: 3.0.3
info:
  title: API Fédération Agricole
  description: openApi specification Federation Agricole
  version: 1.0.0

tags:
  - name: Collectivités

paths:
  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister toutes les collectivités
      responses:
        "200":
          description: Liste des collectivités
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectiviteResponse"

    post:
      tags: [Collectivités]
      summary: Créer une nouvelle collectivité
      description: Soumet une demande de création. Nécessite l'autorisation formelle de la fédération.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectiviteCreate"
      responses:
        "201":
          description: Collectivité créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Autorisation de la fédération manquante
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Conditions d'ouverture non remplies (membres insuffisants, postes non pourvus)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /collectivites/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [Collectivités]
      summary: Obtenir une collectivité par ID
      responses:
        "200":
          description: Collectivité trouvée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          description: Collectivité introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [Collectivités]
      summary: Mettre à jour une collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectiviteUpdate"
      responses:
        "200":
          description: Collectivité mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          description: Collectivité introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Collectivités]
      summary: Supprimer une collectivité
      responses:
        "204":
          description: Supprimée avec succès
        "404":
          description: Collectivité introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /collectivites/{id}/autorisation:
    post:
      tags: [Collectivités]
      summary: Accorder l'autorisation d'ouverture (fédération uniquement)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autorisation accordée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          description: Collectivité introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Autorisation déjà accordée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    CollectiviteCreate:
      type: object
      required:
        - nom
        - ville
        - specialite
        - membres_fondateurs
      properties:
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        membres_fondateurs:
          type: array
          description: IDs des membres fondateurs (min 10, ancienneté ≥ 6 mois)
          minItems: 10
          items:
            type: integer
        postes_initiaux:
          type: array
          description: Attribution des postes spécifiques
          items:
            $ref: "#/components/schemas/PosteAttribution"

    CollectiviteUpdate:
      type: object
      properties:
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string

    CollectiviteResponse:
      type: object
      properties:
        id:
          type: integer
        numero:
          type: string
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        date_creation:
          type: string
          format: date
        autorisation_federation:
          type: boolean

    PosteAttribution:
      type: object
      required:
        - membre_id
        - poste
      properties:
        membre_id:
          type: integer
        poste:
          type: string
          enum:
            - PRESIDENT
            - PRESIDENT_ADJOINT
            - TRESORIER
            - SECRETAIRE
            - MEMBRE_CONFIRME
            - MEMBRE_JUNIOR

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string