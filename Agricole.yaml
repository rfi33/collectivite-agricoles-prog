openapi: 3.0.3
info:
  title: API Fédération Agricole
  version: 1.0.0

paths:

  /collectivites:
    get:
      summary: Lister toutes les collectivités
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectiviteResponse"
    post:
      summary: Créer une collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectiviteRequest"
      responses:
        "201":
          description: Créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /collectivites/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Obtenir une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Modifier une collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectiviteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Supprimer une collectivité
      responses:
        "204":
          description: Supprimée
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/autorisation:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      summary: Accorder l'autorisation d'ouverture
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiviteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectivites/{id}/mandats:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Lister les mandats d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MandatResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Créer un mandat
      description: Mandat d'un an. Max 2 mandats par membre par poste.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MandatRequest"
      responses:
        "201":
          description: Mandat créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandatResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /collectivites/{id}/mandats/{mandat_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/mandat_id"
    get:
      summary: Obtenir un mandat
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandatResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/membres:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Lister les membres d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Admettre un nouveau membre
      description: Parrain confirmé requis (ancienneté > 90 jours). Membres fondateurs avec 6 mois d'ancienneté minimum.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembreRequest"
      responses:
        "201":
          description: Admis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /collectivites/{id}/membres/{membre_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/membre_id"
    get:
      summary: Obtenir un membre
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Modifier un membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembreUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/membres/{membre_id}/transfert:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/membre_id"
    post:
      summary: Transférer un membre vers une autre collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nouvelle_collectivite_id]
              properties:
                nouvelle_collectivite_id:
                  type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/membres/{membre_id}/demission:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/membre_id"
    post:
      summary: Enregistrer la démission d'un membre
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectivites/{id}/cotisations:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Lister les cotisations d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CotisationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Enregistrer une cotisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CotisationRequest"
      responses:
        "201":
          description: Cotisation enregistrée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CotisationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/cotisations/{cotisation_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/cotisation_id"
    get:
      summary: Obtenir une cotisation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CotisationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Supprimer une cotisation
      responses:
        "204":
          description: Supprimée
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/comptes:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Lister les comptes d'une collectivité
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Ajouter un compte
      description: Une seule caisse autorisée. Plusieurs comptes bancaires et mobile money possibles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompteRequest"
      responses:
        "201":
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectivites/{id}/comptes/{compte_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/compte_id"
    get:
      summary: Obtenir un compte
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Modifier un compte
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Supprimer un compte
      responses:
        "204":
          description: Supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /collectivites/{id}/comptes/{compte_id}/solde:
    parameters:
      - $ref: "#/components/parameters/id"
      - $ref: "#/components/parameters/compte_id"
    get:
      summary: Obtenir le solde d'un compte
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoldeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    membre_id:
      name: membre_id
      in: path
      required: true
      schema:
        type: integer
    mandat_id:
      name: mandat_id
      in: path
      required: true
      schema:
        type: integer
    cotisation_id:
      name: cotisation_id
      in: path
      required: true
      schema:
        type: integer
    compte_id:
      name: compte_id
      in: path
      required: true
      schema:
        type: integer

  responses:
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Données invalides
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Conditions métier non remplies
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflit avec l'état actuel
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:

    CollectiviteRequest:
      type: object
      required: [nom, ville, specialite, membres_fondateurs]
      properties:
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        membres_fondateurs:
          type: array
          minItems: 10
          description: IDs des membres avec au moins 6 mois d'ancienneté dans la fédération
          items:
            type: integer
        postes_initiaux:
          type: array
          items:
            $ref: "#/components/schemas/PosteAttribution"

    CollectiviteResponse:
      type: object
      properties:
        id:
          type: integer
        numero:
          type: string
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        date_creation:
          type: string
          format: date
        autorisation_federation:
          type: boolean

    PosteAttribution:
      type: object
      required: [membre_id, poste]
      properties:
        membre_id:
          type: integer
        poste:
          $ref: "#/components/schemas/Poste"

    MandatRequest:
      type: object
      required: [annee, postes]
      properties:
        annee:
          type: integer
        postes:
          type: array
          items:
            $ref: "#/components/schemas/PosteAttribution"

    MandatResponse:
      type: object
      properties:
        id:
          type: integer
        annee:
          type: integer
        collectivite_id:
          type: integer
        postes:
          type: array
          items:
            $ref: "#/components/schemas/PosteAttribution"

    MembreRequest:
      type: object
      required: [nom, prenoms, date_naissance, genre, adresse, metier, telephone, email, parrain_id, paiement]
      properties:
        nom:
          type: string
        prenoms:
          type: string
        date_naissance:
          type: string
          format: date
        genre:
          $ref: "#/components/schemas/Genre"
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        parrain_id:
          type: integer
        paiement:
          $ref: "#/components/schemas/Paiement"

    MembreUpdate:
      type: object
      properties:
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email

    MembreResponse:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        prenoms:
          type: string
        date_naissance:
          type: string
          format: date
        genre:
          $ref: "#/components/schemas/Genre"
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        date_adhesion:
          type: string
          format: date
        poste:
          $ref: "#/components/schemas/Poste"
        collectivite_id:
          type: integer
        actif:
          type: boolean

    CotisationRequest:
      type: object
      required: [membre_id, montant, date, mode_paiement, type]
      properties:
        membre_id:
          type: integer
        montant:
          type: number
        date:
          type: string
          format: date
        mode_paiement:
          $ref: "#/components/schemas/ModePaiement"
        type:
          $ref: "#/components/schemas/TypeCotisation"

    CotisationResponse:
      type: object
      properties:
        id:
          type: integer
        membre_id:
          type: integer
        collectivite_id:
          type: integer
        montant:
          type: number
        date:
          type: string
          format: date
        mode_paiement:
          $ref: "#/components/schemas/ModePaiement"
        type:
          $ref: "#/components/schemas/TypeCotisation"

    CompteRequest:
      type: object
      required: [type, titulaire]
      properties:
        type:
          $ref: "#/components/schemas/TypeCompte"
        titulaire:
          type: string
        banque:
          type: string
          enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]
        numero_compte:
          type: string
          pattern: '^\d{23}$'
          description: "Format : BBBBB GGGGG CCCCCCCCCCC KK (23 chiffres)"
        service_mobile:
          type: string
          enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]
        telephone:
          type: string

    CompteResponse:
      type: object
      properties:
        id:
          type: integer
        type:
          $ref: "#/components/schemas/TypeCompte"
        titulaire:
          type: string
        banque:
          type: string
        numero_compte:
          type: string
        service_mobile:
          type: string
        telephone:
          type: string
        solde:
          type: number
        collectivite_id:
          type: integer

    SoldeResponse:
      type: object
      properties:
        compte_id:
          type: integer
        date:
          type: string
          format: date
        solde:
          type: number
          description: Solde en MGA

    Poste:
      type: string
      enum: [PRESIDENT, PRESIDENT_ADJOINT, TRESORIER, SECRETAIRE, MEMBRE_CONFIRME, MEMBRE_JUNIOR]

    Genre:
      type: string
      enum: [M, F]

    TypeCotisation:
      type: string
      enum: [MENSUELLE, ANNUELLE, PONCTUELLE]

    ModePaiement:
      type: string
      enum: [ESPECE, MOBILE_MONEY, VIREMENT_BANCAIRE]

    TypeCompte:
      type: string
      enum: [CAISSE, BANCAIRE, MOBILE_MONEY]

    Paiement:
      type: object
      required: [mode, reference]
      properties:
        mode:
          type: string
          enum: [MOBILE_MONEY, VIREMENT_BANCAIRE]
        reference:
          type: string

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string